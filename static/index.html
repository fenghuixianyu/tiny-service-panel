<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tiny Service Panel</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <section id="loginPanel" class="login-panel" hidden>
    <form id="loginForm" class="login-card">
      <div class="brand-mark">◆</div>
      <h1>Tiny Service Panel</h1>
      <p class="subtitle">请输入访问密码</p>
      <input id="loginPassword" type="password" autocomplete="current-password" placeholder="密码" required />
      <label class="remember-row"><input id="rememberDevice" type="checkbox" checked /> 记住此设备</label>
      <button class="ok" type="submit">登录</button>
      <p id="loginError" class="login-error" hidden></p>
    </form>
  </section>

  <div id="appShell" hidden>
  <header class="hero">
    <div class="brand-row">
      <div class="brand-mark">◆</div>
      <div>
        <h1>Tiny Service Panel</h1>
        <p class="subtitle">按需启动的轻量 systemd 控制台 · 空闲 10 分钟退出</p>
      </div>
      <button id="logout" class="icon-btn text-btn" title="退出登录" aria-label="退出登录" hidden>退出</button>
      <button id="refresh" class="icon-btn" title="刷新" aria-label="刷新"><span>↻</span></button>
    </div>
    <section id="dashboard" class="dashboard">
      <div class="metric"><span>主机</span><strong id="host">...</strong></div>
      <div class="metric"><span>运行时间</span><strong id="uptime">...</strong></div>
      <div class="metric"><span>内存</span><strong id="mem">...</strong></div>
      <div class="metric"><span>Swap</span><strong id="swap">...</strong></div>
      <div class="metric"><span>Load 1/5/15 分钟</span><strong id="load">...</strong></div>
      <div class="metric"><span>根分区</span><strong id="disk">...</strong></div>
      <div class="metric"><span>重启需求</span><strong id="reboot">...</strong></div>
    </section>
    <section class="disk-panel">
      <div class="panel-title"><strong>磁盘分区</strong><span id="diskHint">...</span></div>
      <div id="disks" class="disk-list"></div>
    </section>
    <p id="toast" class="toast" hidden></p>
    <section class="toolbar">
      <input id="filter" placeholder="过滤服务名/描述/备注" />
      <div class="toolbar-scroll">
        <select id="type">
          <option value="all">service + socket + timer</option>
          <option value="service">services</option>
          <option value="socket">sockets</option>
          <option value="timer">timers</option>
        </select>
        <select id="sort">
          <option value="memory">按内存排序</option>
          <option value="cpu">按 CPU 排序</option>
          <option value="name">按名称排序</option>
          <option value="state">按状态排序</option>
          <option value="boot">按自启排序</option>
        </select>
        <select id="stateFilter" title="状态筛选">
          <option value="all">全部状态</option>
          <option value="active">运行中</option>
          <option value="inactive">已停止</option>
          <option value="problem">异常/切换中</option>
        </select>
        <select id="bootFilter" title="开机自启筛选">
          <option value="all">全部自启</option>
          <option value="enabled">已自启</option>
          <option value="disabled">未自启</option>
          <option value="locked">不可改</option>
          <option value="masked">已屏蔽</option>
        </select>
        <button id="dir">降序</button>
        <button id="hideNoisy" class="toggle on">隐藏系统项</button>
        <button id="favoritesOnly" class="toggle">收藏列表</button>
        <button id="problemFirst" class="toggle">异常置顶</button>
      </div>
    </section>
  </header>

  <main>
    <div class="list-head"><strong>服务列表</strong><span id="listCount">...</span></div>
    <div class="table-card">
      <table>
        <thead><tr><th>Unit</th><th>内存</th><th>状态</th><th>自启</th><th>CPU</th><th>进程</th><th>描述</th><th>操作</th></tr></thead>
        <tbody id="units"></tbody>
      </table>
    </div>
    <section id="mobileUnits" class="mobile-units"></section>
  </main>

  <dialog id="modal">
    <form method="dialog"><button class="close">关闭</button></form>
    <h3 id="modal-title"></h3>
    <pre id="modal-body"></pre>
  </dialog>
  </div>

  <script src="/app.js"></script>
</body>
</html>
